<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DentalVision</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
</head>

<body class="bg-[#eef5ff] flex justify-center p-10 font-sans">

<div class="w-[900px] grid grid-cols-[350px_1fr] gap-[30px]">

    <div class="bg-white p-[25px] rounded-[20px] shadow-[0_15px_35px_rgba(0,0,0,0.08)] text-center h-fit">
        <h1 class="text-[#2563eb] text-3xl font-bold mb-[10px]">
            <i class="fa-solid fa-tooth"></i>
            DentalVision
        </h1>
        <p class="text-gray-500 mb-[20px] text-sm">
            AI Screening Pemeriksaan Gigi Berbasis Artificial Intelligence
        </p>

        <div class="w-full h-[260px] border-2 border-dashed border-[#2563eb] rounded-[15px] flex justify-center items-center overflow-hidden mb-[20px]">
            <img id="preview" src="https://placehold.co/300x250?text=Preview+Image" class="w-full h-full object-cover">
        </div>

        <input type="file" id="imageUpload" hidden>

        <button class="w-full padding p-[13px] bg-[#2563eb] hover:bg-[#1d4ed8] color text-white border-none rounded-[10px] text-[16px] cursor-pointer mb-[15px] transition duration-300"
                onclick="document.getElementById('imageUpload').click()">
            <i class="fa-solid fa-image"></i>
            Pilih Foto
        </button>

        <button class="w-full padding p-[13px] bg-[#10b981] hover:bg-[#059669] color text-white border-none rounded-[10px] text-[16px] cursor-pointer transition duration-300"
                onclick="predict()">
            <i class="fa-solid fa-magnifying-glass"></i>
            Analisis AI
        </button>
    </div>

    <div id="result" class="bg-white p-[30px] rounded-[20px] shadow-[0_15px_35px_rgba(0,0,0,0.08)] min-h-[550px]">
        <h2 class="text-[#2563eb] text-2xl font-bold mb-[20px]">
            <i class="fa-solid fa-notes-medical"></i>
            Hasil Analisis
        </h2>
        <p class="text-gray-600 leading-[1.8] my-[10px]">
            Upload gambar terlebih dahulu.
        </p>
    </div>

</div>

<script src="js/app.js"></script>
</body>
</html>
